<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .display-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            text-align: right;
            min-height: 1.5rem;
            margin-bottom: 5px;
        }

        .display {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            text-align: right;
            font-weight: 300;
            outline: none;
        }

        .display::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            padding: 18px;
            font-size: 1.4rem;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn.operator {
            background: rgba(255, 159, 67, 0.2);
            color: #ff9f43;
        }

        .btn.operator:hover {
            background: rgba(255, 159, 67, 0.3);
        }

        .btn.function {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .btn.function:hover {
            background: rgba(255, 71, 87, 0.3);
        }

        .btn.equals {
            background: linear-gradient(135deg, #2ed573 0%, #26de81 100%);
            color: #fff;
            font-weight: 600;
        }

        .btn.equals:hover {
            background: linear-gradient(135deg, #26de81 0%, #2ed573 100%);
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
        }

        .btn.zero {
            grid-column: span 2;
        }

        @media (max-width: 400px) {
            .calculator {
                width: 95vw;
                padding: 15px;
            }

            .display {
                font-size: 2rem;
            }

            .btn {
                padding: 15px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display-container">
            <div class="previous-operand" id="previous-operand"></div>
            <input type="text" id="display" class="display" placeholder="0" autocomplete="off">
        </div>
        <div class="buttons">
            <button class="btn function" onclick="clearAll()">AC</button>
            <button class="btn function" onclick="deleteChar()">DEL</button>
            <button class="btn function" onclick="calculatePercent()">%</button>
            <button class="btn operator" onclick="setOperator('/')">÷</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="setOperator('*')">×</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="setOperator('-')">−</button>
            
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="setOperator('+')">+</button>
            
            <button class="btn zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendDecimal()">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const previousOperandEl = document.getElementById('previous-operand');
        
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let shouldResetScreen = false;

        display.value = '0';

        function appendNumber(num) {
            if (shouldResetScreen) {
                currentOperand = '';
                shouldResetScreen = false;
            }
            
            if (num === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && num !== '.') {
                currentOperand = num;
            } else if (num !== '.' || !currentOperand.includes('.')) {
                currentOperand = currentOperand.toString() + num.toString();
            }
            
            if (currentOperand.length > 15) {
                currentOperand = currentOperand.slice(0, 15);
            }
            
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetScreen) {
                currentOperand = '0';
                shouldResetScreen = false;
            }
            if (!currentOperand.includes('.')) {
                currentOperand += '.';
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operation !== undefined && !shouldResetScreen) {
                calculate();
            }
            previousOperand = currentOperand;
            operation = op;
            shouldResetScreen = true;
            updatePreviousDisplay();
        }

        function calculate() {
            if (operation === undefined || shouldResetScreen) return;
            
            let result;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        currentOperand = 'Error';
                        updateDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }

            result = Math.round(result * 100000000) / 100000000;
            currentOperand = result.toString();
            operation = undefined;
            shouldResetScreen = true;
            updateDisplay();
            previousOperand = '';
            updatePreviousDisplay();
        }

        function clearAll() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            shouldResetScreen = false;
            updateDisplay();
            updatePreviousDisplay();
        }

        function deleteChar() {
            if (currentOperand.length === 1 || currentOperand === 'Error') {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        function calculatePercent() {
            const current = parseFloat(currentOperand);
            if (isNaN(current)) return;
            currentOperand = (current / 100).toString();
            updateDisplay();
        }

        function updateDisplay() {
            display.value = currentOperand;
        }

        function updatePreviousDisplay() {
            if (operation) {
                previousOperandEl.textContent = previousOperand + ' ' + getOperationSymbol(operation);
            } else {
                previousOperandEl.textContent = '';
            }
        }

        function getOperationSymbol(op) {
            switch (op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return '';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+' || e.key === '-') setOperator(e.key);
            if (e.key === '*') setOperator('*');
            if (e.key === '/') setOperator('/');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteChar();
        });
    </script>
</body>
</html>
